<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future 3D Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f172a);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.scene{
    perspective:1200px;
}

.card{
    width:420px;
    height:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:40px;
    color:white;
    transform-style:preserve-3d;
    transition:transform .15s ease;
    box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.logo{
    font-size:50px;
    transform:translateZ(80px);
}

h1{
    margin-top:20px;
    font-size:42px;
    transform:translateZ(60px);
}

p{
    margin-top:20px;
    line-height:1.7;
    color:#d1d5db;
    transform:translateZ(40px);
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 30px;
    text-decoration:none;
    background:linear-gradient(45deg,#3b82f6,#8b5cf6);
    color:white;
    border-radius:30px;
    transform:translateZ(70px);
    transition:.3s;
}

.btn:hover{
    transform:translateZ(90px) scale(1.1);
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(10px);
    animation:float 6s ease-in-out infinite;
}

.c1{
    width:200px;
    height:200px;
    background:#3b82f6;
    top:10%;
    left:10%;
}

.c2{
    width:150px;
    height:150px;
    background:#8b5cf6;
    bottom:10%;
    right:10%;
}

.c3{
    width:120px;
    height:120px;
    background:#06b6d4;
    top:20%;
    right:20%;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-30px);}
}
</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="scene">
    <div class="card" id="card">
        <div class="logo">🚀</div>
        <h1>Future Vision</h1>
        <p>
            A next-generation 3D website experience featuring
            glassmorphism, dynamic lighting, mouse interaction,
            floating objects and immersive animations.
        </p>
        <a href="#" class="btn">Get Started</a>
    </div>
</div>

<script>
const card = document.getElementById('card');

document.addEventListener('mousemove', (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 25;
    let y = (window.innerHeight / 2 - e.pageY) / 25;

    card.style.transform =
        `rotateY(${x}deg) rotateX(${-y}deg)`;
});

document.addEventListener('mouseleave', () => {
    card.style.transform =
        'rotateY(0deg) rotateX(0deg)';
});
</script>

</body>
</html>

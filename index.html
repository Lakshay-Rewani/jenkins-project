<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAKSTRIKE ENERGY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%,rgba(255,0,0,.3),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(255,0,0,.2),transparent 40%);
animation:pulse 5s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

.particle{
position:absolute;
background:red;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

.container{
position:relative;
z-index:10;
display:flex;
align-items:center;
justify-content:space-between;
width:90%;
max-width:1400px;
}

.left{
max-width:600px;
}

.left h1{
font-size:90px;
font-weight:900;
line-height:0.9;
text-transform:uppercase;
}

.red{
color:#ff1111;
text-shadow:
0 0 20px red,
0 0 50px red,
0 0 100px red;
}

.left p{
margin-top:25px;
font-size:18px;
line-height:1.8;
color:#cccccc;
}

.btns{
margin-top:35px;
}

button{
padding:15px 35px;
border:none;
border-radius:40px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-right:15px;
transition:.3s;
}

.buy{
background:#ff1111;
color:white;
box-shadow:0 0 30px red;
}

.buy:hover{
transform:translateY(-5px);
}

.story{
background:transparent;
border:2px solid red;
color:white;
}

.scene{
perspective:1200px;
}

.can{
width:280px;
height:580px;
position:relative;
transform-style:preserve-3d;
animation:spin 8s infinite linear;
}

.body{
width:100%;
height:100%;
border-radius:40px;
background:
linear-gradient(
135deg,
#000,
#220000,
#ff0000,
#330000,
#000);
box-shadow:
0 0 50px rgba(255,0,0,.8),
0 0 120px rgba(255,0,0,.3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
font-size:48px;
font-weight:900;
letter-spacing:4px;
}

.energy{
margin-top:20px;
font-size:24px;
}

.lightning{
font-size:80px;
margin-bottom:30px;
}

@keyframes spin{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(360deg);
}
}

.stats{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:60px;
}

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#ff1111;
}

.stat p{
color:#aaa;
}
</style>
</head>

<body>

<div class="bg"></div>

<script>
for(let i=0;i<80;i++){
let p=document.createElement('div');
p.className='particle';
p.style.width=Math.random()*5+2+'px';
p.style.height=p.style.width;
p.style.left=Math.random()*100+'vw';
p.style.animationDuration=Math.random()*10+5+'s';
document.body.appendChild(p);
}
</script>

<div class="container">

<div class="left">
<h1>
UNLEASH<br>
<span class="red">YOUR</span><br>
POWER
</h1>

<p>
LAKSTRIKE ENERGY is engineered for champions.
Built for gamers, athletes, creators and coders.
Maximum Focus. Maximum Energy. Zero Limits.
</p>

<div class="btns">
<button class="buy">BUY NOW</button>
<button class="story">WATCH STORY</button>
</div>
</div>

<div class="scene">
<div class="can" id="can">

<div class="body">
<div class="lightning">⚡</div>
<div class="logo">LAKSTRIKE</div>
<div class="energy">ENERGY</div>
</div>

</div>
</div>

</div>

<div class="stats">
<div class="stat">
<h2>200%</h2>
<p>FOCUS</p>
</div>

<div class="stat">
<h2>150%</h2>
<p>ENERGY</p>
</div>

<div class="stat">
<h2>24/7</h2>
<p>PERFORMANCE</p>
</div>
</div>

<script>
const can=document.getElementById('can');

document.addEventListener('mousemove',(e)=>{
let x=(window.innerWidth/2-e.clientX)/40;
let y=(window.innerHeight/2-e.clientY)/40;

can.style.transform=
`rotateY(${x}deg) rotateX(${-y}deg)`;
});
</script>

</body>
</html>

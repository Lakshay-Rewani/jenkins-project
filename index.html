<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Nginx Demo Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #232F3E, #FF9900);
            color: white;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #f0f0f0;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
        }

        .badge {
            display: inline-block;
            background: white;
            color: #232F3E;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        footer {
            margin-top: 50px;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to My Nginx Server</h1>
        <h2>Hosted on AWS EC2 using Ubuntu & Nginx</h2>

        <div class="card">
            <p>This website demonstrates the deployment of a static web application using:</p>

            <p>
                ✅ Ubuntu Server<br>
                ✅ Nginx Web Server<br>
                ✅ Amazon EC2<br>
                ✅ Security Groups<br>
                ✅ Linux Administration
            </p>

            <div class="badge">
                Deployed by Lakshay Rewani
            </div>
        </div>

        <footer>
            <p>Powered by AWS • Nginx • Ubuntu</p>
        </footer>
    </div>
</body>
</html>

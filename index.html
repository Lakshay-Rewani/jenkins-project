<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAKFLIX</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#141414;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#000;
position:fixed;
width:100%;
z-index:100;
}

.logo{
font-size:32px;
font-weight:bold;
color:#E50914;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
background:red;
}

.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600') center/cover;
display:flex;
align-items:center;
padding:80px;
}

.hero-content{
max-width:600px;
}

.hero h1{
font-size:70px;
margin-bottom:20px;
}

.hero p{
font-size:18px;
line-height:1.8;
margin-bottom:25px;
}

.btn{
padding:12px 30px;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
margin-right:10px;
}

.play{
background:white;
color:black;
}

.info{
background:rgba(109,109,110,.7);
color:white;
}

.section{
padding:30px 50px;
}

.section h2{
margin-bottom:20px;
}

.movies{
display:flex;
gap:15px;
overflow-x:auto;
}

.movie{
min-width:250px;
height:140px;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.movie:hover{
transform:scale(1.08);
}

.movie img{
width:100%;
height:100%;
object-fit:cover;
}

.movies::-webkit-scrollbar{
display:none;
}

footer{
padding:30px;
text-align:center;
color:#aaa;
}
</style>

</head>
